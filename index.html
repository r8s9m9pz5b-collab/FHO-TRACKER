<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="FHO Tracker"/>
<meta name="theme-color" content="#0a0f1a"/>
<title>FHO Billing Tracker</title>
<style>
/* 芒聰聙芒聰聙 Design system 芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙 */
:root {
  --bg:       #0a0f1a;
  --bg1:      #111827;
  --bg2:      #1c2537;
  --bg3:      #243046;
  --line:     #2a3a54;
  --line2:    #1e2d44;
  --txt:      #f0f6ff;
  --txt2:     #a8c4e0;
  --txt3:     #6a8fb0;
  --muted:    #3d5470;
  --dim:      #243044;
  --gold:     #c9a84c;
  --gold2:    #f0c96a;
  --gold-bg:  #1a1508;
  --blue:     #2563eb;
  --blue2:    #3b82f6;
  --blue-bg:  #0d1a35;
  --teal:     #0d9488;
  --teal2:    #14b8a6;
  --teal-bg:  #041a18;
  --red:      #dc2626;
  --red2:     #ef4444;
  --amber:    #d97706;
  --amber2:   #f59e0b;
  --green:    #059669;
  --green2:   #10b981;
  --green-bg: #041a10;
  --r-sm:     10px;
  --r-md:     16px;
  --r-lg:     22px;
  --r-xl:     28px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
  background: var(--bg);
  overscroll-behavior: none;
  -webkit-text-size-adjust: 100%;
}

body {
  font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
  -webkit-tap-highlight-color: transparent;
  color: var(--txt);
}

#app {
  max-width: 430px;
  margin: 0 auto;
  height: 100vh;
  height: 100dvh;
  background: var(--bg);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  position: relative;
}

/* Subtle top glow */
#app::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 200px;
  background: radial-gradient(ellipse at 50% -20%, rgba(37,99,235,0.12) 0%, transparent 70%);
  pointer-events: none;
  z-index: 0;
}

/* 芒聰聙芒聰聙 Status bar 芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙 */
.sb {
  display: flex;
  justify-content: space-between;
  padding: max(14px, env(safe-area-inset-top)) 22px 6px;
  font-size: 12px;
  font-weight: 600;
  letter-spacing: .02em;
  color: var(--txt3);
  flex-shrink: 0;
  position: relative;
  z-index: 2;
}

/* 芒聰聙芒聰聙 Top nav 芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙 */
.nav {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 20px 14px;
  flex-shrink: 0;
  position: relative;
  z-index: 2;
}

.nav-left { display: flex; flex-direction: column; gap: 2px; }

.nav-title {
  font-size: 26px;
  font-weight: 800;
  color: var(--txt);
  letter-spacing: -.5px;
  line-height: 1;
}

.nav-title span {
  color: var(--gold);
}

.nav-sub {
  font-size: 10px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: .14em;
  color: var(--txt3);
}

.gear-btn {
  width: 38px; height: 38px;
  background: var(--bg2);
  border: 1px solid var(--line);
  border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  color: var(--txt3);
  font-size: 16px;
  transition: all .15s;
}
.gear-btn:active { background: var(--bg3); color: var(--txt2); }

/* 芒聰聙芒聰聙 Scrollable content 芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙 */
.screen {
  flex: 1;
  overflow-y: auto;
  padding: 0 16px 20px;
  -webkit-overflow-scrolling: touch;
  position: relative;
  z-index: 1;
}
.screen::-webkit-scrollbar { display: none; }

/* 芒聰聙芒聰聙 KPI grid 芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙 */
.kpi-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 14px;
}

.kpi {
  background: var(--bg1);
  border: 1px solid var(--line2);
  border-radius: var(--r-md);
  padding: 14px;
  position: relative;
  overflow: hidden;
}

.kpi::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  border-radius: var(--r-md) var(--r-md) 0 0;
}

.kpi.blue::before  { background: linear-gradient(90deg, var(--blue), var(--blue2)); }
.kpi.teal::before  { background: linear-gradient(90deg, var(--teal), var(--teal2)); }
.kpi.gold::before  { background: linear-gradient(90deg, var(--gold), var(--gold2)); }
.kpi.green::before { background: linear-gradient(90deg, var(--green), var(--green2)); }

.kpi-lbl {
  font-size: 9px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .14em;
  color: var(--txt3);
  margin-bottom: 6px;
}

.kpi-val {
  font-size: 24px;
  font-weight: 800;
  color: var(--txt);
  line-height: 1;
  letter-spacing: -.5px;
}

.kpi-val.sm { font-size: 19px; }

.kpi-sub {
  font-size: 9px;
  font-weight: 500;
  color: var(--muted);
  margin-top: 4px;
}

/* 芒聰聙芒聰聙 Section header 芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙 */
.sh {
  font-size: 9px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .16em;
  color: var(--muted);
  margin: 16px 0 10px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.sh::after { content: ''; flex: 1; height: 1px; background: var(--line2); }

/* 芒聰聙芒聰聙 Bar chart 芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙 */
.chart-card {
  background: var(--bg1);
  border: 1px solid var(--line2);
  border-radius: var(--r-md);
  padding: 16px;
  margin-bottom: 14px;
}

.chart-hd {
  font-size: 9px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .14em;
  color: var(--txt3);
  margin-bottom: 14px;
}

.bars {
  display: flex;
  align-items: flex-end;
  gap: 3px;
  height: 72px;
}

.bar-col {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 5px;
}

.bar-rect {
  width: 100%;
  border-radius: 4px 4px 0 0;
  min-height: 3px;
}

.bar-lbl {
  font-size: 7.5px;
  font-weight: 600;
  color: var(--muted);
  letter-spacing: .02em;
}

/* 芒聰聙芒聰聙 Month rows 芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙 */
.mrow {
  display: flex;
  align-items: center;
  gap: 10px;
  background: var(--bg1);
  border: 1px solid var(--line2);
  border-radius: var(--r-sm);
  padding: 10px 13px;
  margin-bottom: 6px;
  cursor: pointer;
  transition: border-color .15s, background .15s;
  user-select: none;
}

.mrow:active { background: var(--bg2); }
.mrow.cur    { border-color: var(--blue); }

.mrow-name {
  font-size: 11px;
  font-weight: 700;
  color: var(--txt2);
  width: 30px;
  letter-spacing: .02em;
}

.mrow-track {
  flex: 1;
  height: 5px;
  background: var(--bg3);
  border-radius: 3px;
  overflow: hidden;
}

.mrow-fill { height: 100%; border-radius: 3px; }

.mrow-amt {
  font-size: 10px;
  font-weight: 600;
  color: var(--txt3);
  width: 54px;
  text-align: right;
}

.pill {
  font-size: 8px;
  font-weight: 700;
  padding: 3px 8px;
  border-radius: 20px;
  letter-spacing: .04em;
}

.p-ok   { background: rgba(16,185,129,.12); color: var(--green2); border: 1px solid rgba(16,185,129,.25); }
.p-near { background: rgba(245,158,11,.12);  color: var(--amber2); border: 1px solid rgba(245,158,11,.25); }
.p-bad  { background: rgba(239,68,68,.12);   color: var(--red2);   border: 1px solid rgba(239,68,68,.25); }
.p-na   { background: var(--bg3);            color: var(--muted);  border: 1px solid var(--line2); }

/* 芒聰聙芒聰聙 TAB BAR (the prominent one) 芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙 */
.tab-bar {
  flex-shrink: 0;
  padding: 10px 14px max(18px, env(safe-area-inset-bottom));
  background: var(--bg);
  border-top: 1px solid var(--line2);
  position: relative;
  z-index: 10;
}

/* The inner pill container */
.tab-pills {
  display: flex;
  background: var(--bg2);
  border: 1px solid var(--line);
  border-radius: 18px;
  padding: 5px;
  gap: 3px;
}

.tab {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 4px;
  cursor: pointer;
  padding: 8px 4px;
  border-radius: 13px;
  transition: all .2s;
  user-select: none;
  position: relative;
}

.tab.on {
  background: var(--blue);
  box-shadow: 0 2px 12px rgba(37,99,235,.4);
}

.tab-ic {
  font-size: 18px;
  line-height: 1;
}

.tab-lb {
  font-size: 8.5px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .06em;
  color: var(--muted);
}

.tab.on .tab-lb { color: rgba(255,255,255,.9); }

/* 芒聰聙芒聰聙 Entry screen 芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙 */
.hero {
  background: linear-gradient(135deg, #0d1e3d 0%, #0a1628 100%);
  border: 1px solid rgba(37,99,235,.35);
  border-radius: var(--r-lg);
  padding: 18px;
  margin-bottom: 14px;
  position: relative;
  overflow: hidden;
}

.hero::after {
  content: '';
  position: absolute;
  top: -30px; right: -30px;
  width: 120px; height: 120px;
  background: radial-gradient(circle, rgba(37,99,235,.15) 0%, transparent 70%);
  border-radius: 50%;
}

.hero-lbl {
  font-size: 9px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .16em;
  color: var(--txt3);
  margin-bottom: 6px;
}

.hero-val {
  font-size: 44px;
  font-weight: 900;
  color: var(--txt);
  line-height: 1;
  letter-spacing: -1.5px;
}

.hero-unit {
  font-size: 18px;
  font-weight: 600;
  color: var(--txt3);
  margin-left: 2px;
}

.hero-sub {
  font-size: 11px;
  font-weight: 500;
  color: var(--txt3);
  margin-top: 5px;
}

.pbar-wrap {
  margin-top: 12px;
  height: 5px;
  background: rgba(255,255,255,.06);
  border-radius: 3px;
  overflow: hidden;
}

.pbar-fill {
  height: 100%;
  border-radius: 3px;
  transition: width .4s ease, background .3s;
}

.warn-box {
  background: rgba(217,119,6,.1);
  border: 1px solid rgba(217,119,6,.3);
  border-radius: var(--r-sm);
  padding: 9px 13px;
  font-size: 11px;
  font-weight: 600;
  color: var(--amber2);
  margin-bottom: 10px;

function daysIn(y,m) { return new Date(y,m+1,0).getDate(); }
function mCap(y,m)   { return Math.round(240*(daysIn(y,m)/28)*10)/10; }
function calc$(h,r)  { return Math.round(h*4)*(r/4); }
function fmt$(n)     { return n>=1000 ? "$"+(n/1000).toFixed(1)+"k" : "$"+Math.round(n); }
function pad(n)      { return String(n).padStart(2,"0"); }
function todayS()    { var d=new Date(); return d.getFullYear()+"-"+pad(d.getMonth()+1)+"-"+pad(d.getDate()); }
function fmtDate(s)  { return new Date(s+"T12:00:00").toLocaleDateString("en-CA",{weekday:"short",month:"short",day:"numeric",year:"numeric"}); }
function shiftDate(s,d) { var dt=new Date(s+"T12:00:00"); dt.setDate(dt.getDate()+d); return dt.toISOString().slice(0,10); }
function barClr(st)  { return st==="bad"?"#ef4444":st==="near"?"#f59e0b":st==="empty"?"#243046":"#3b82f6"; }

var SK="fho_v1", SS="fho_s_v1";

var S = {

var toastTimer;

  S.toast=msg; S.toastOn=true; draw();

// 芒聰聙芒聰聙 Month data 芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙
function mData(mi) {
  var y=S.settings.year, prefix=y+"-"+pad(mi+1), cap=mCap(y,mi);
  var q310h=0,q311h=0,q312h=0,q313h=0,q310$=0,q311$=0,q312$=0,q313$=0,other=0,third=0,maxD=0;
  Object.keys(S.entries).forEach(function(k){
    if(k.indexOf(prefix)!==0) return;
    var e=S.entries[k];
    q310h+=(e.q310h||0); q311h+=(e.q311h||0); q312h+=(e.q312h||0); q313h+=(e.q313h||0);
    q310$+=(e.q310$||0); q311$+=(e.q311$||0); q312$+=(e.q312$||0); q313$+=(e.q313$||0);
    other+=(e.other||0); third+=(e.third||0);
    var d=(e.q310h||0)+(e.q311h||0)+(e.q312h||0)+(e.q313h||0);
    if(d>maxD) maxD=d;
  });
  var th=q310h+q311h+q312h+q313h, fho$=q310$+q311$+q312$+q313$;
  return {
    cap,th,fho$,tot$:fho$+other+third,
    q310h,q311h,q312h,q313h,q310$,q311$,q312$,q313$,other,third,maxD,
    q3r:   th>0?(q312h+q313h)/th:0,
    q313r: th>0?q313h/th:0,
    pct:   th/cap,
    status:th===0?"empty":th>cap?"bad":th>cap*.9?"near":"ok"
  };
}

// 芒聰聙芒聰聙 DOM builder 芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙
function h(tag, attrs, children) {
  var e = document.createElement(tag);
  if(attrs) Object.keys(attrs).forEach(function(k){
    var v=attrs[k];
    if(v===null||v===undefined||v===false) return;
    if(k==="cls") e.className=v;
    else if(k==="style"&&typeof v==="object") Object.assign(e.style,v);
    else if(k.slice(0,2)==="on") e.addEventListener(k.slice(2),v);
    else e.setAttribute(k,v);
  });
  if(children) [].concat(children).forEach(function(c){
    if(c==null||c===false||c===undefined) return;
    e.appendChild(typeof c==="string" ? document.createTextNode(c) : c);
  });
  return e;
}

function svgEl(tag, attrs, children) {
  var e = document.createElementNS("http://www.w3.org/2000/svg", tag);
  if(attrs) Object.keys(attrs).forEach(function(k){ e.setAttribute(k,String(attrs[k])); });
  if(children) [].concat(children).forEach(function(c){ if(c) e.appendChild(c); });
  return e;
}

// 芒聰聙芒聰聙 Dashboard 芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙
function buildDashboard() {
  var allM = MN.map(function(_,i){ return mData(i); });
  var ytdFHO   = allM.reduce(function(s,m){ return s+m.fho$; },0);
  var ytdOther = allM.reduce(function(s,m){ return s+m.other; },0);
  var ytd3rd   = allM.reduce(function(s,m){ return s+m.third; },0);
  var ytdH     = allM.reduce(function(s,m){ return s+m.th; },0);
  var totCap   = allM.reduce(function(s,m){ return s+m.cap; },0);
  var curMi    = new Date().getMonth();
  var maxFHO   = Math.max.apply(null, allM.map(function(m){ return m.fho$; }).concat([1]));

  var bars = h("div",{cls:"bars"}, allM.map(function(m,i){
    var bh = Math.max(3, Math.round((m.fho$/maxFHO)*64));
    return h("div",{cls:"bar-col"},[
      h("div",{cls:"bar-rect",style:{height:bh+"px",background:barClr(m.status),borderRadius:"4px 4px 0 0"}}),
      h("span",{cls:"bar-lbl"},MN[i])
    ]);
  }));

  var mrows = allM.map(function(m,i){
    var pc = m.status==="ok"?"p-ok":m.status==="near"?"p-near":m.status==="bad"?"p-bad":"p-na";
    var pt = m.status==="ok"?"OK":m.status==="near"?"Near":m.status==="bad"?"Over":"芒聙聰";
    return h("div",{cls:"mrow"+(i===curMi?" cur":""),onclick:function(){ S.tab="compliance"; S.compM=i; draw(); }},[
      h("span",{cls:"mrow-name"},MN[i]),
      h("div",{cls:"mrow-track"},[h("div",{cls:"mrow-fill",style:{width:Math.min(100,m.pct*100)+"%",background:barClr(m.status)}})]),
      h("span",{cls:"mrow-amt"},m.fho$>0?fmt$(m.fho$):"芒聙聰"),
      h("span",{cls:"pill "+pc},pt)
    ]);
  });

  return h("div",{cls:"screen"},[
    h("div",{cls:"kpi-grid"},[
      h("div",{cls:"kpi blue"},[h("div",{cls:"kpi-lbl"},"Annual FHO Rev"),h("div",{cls:"kpi-val"},fmt$(ytdFHO)),h("div",{cls:"kpi-sub"},"YTD billed")]),
      h("div",{cls:"kpi teal"},[h("div",{cls:"kpi-lbl"},"Hours Used"),h("div",{cls:"kpi-val"+(ytdH/totCap>.9?" near":"")},ytdH.toFixed(0)),h("div",{cls:"kpi-sub"},"of "+totCap.toFixed(0)+" cap")]),
      h("div",{cls:"kpi gold"},[h("div",{cls:"kpi-lbl"},"Other OHIP YTD"),h("div",{cls:"kpi-val sm"},fmt$(ytdOther)),h("div",{cls:"kpi-sub"},"shadow billings")]),
      h("div",{cls:"kpi green"},[h("div",{cls:"kpi-lbl"},"3rd Party YTD"),h("div",{cls:"kpi-val sm"},fmt$(ytd3rd)),h("div",{cls:"kpi-sub"},"private / WSIB")])
    ]),
    h("div",{cls:"chart-card"},[h("div",{cls:"chart-hd"},"Monthly FHO Revenue"),bars]),
    h("div",{cls:"sh"},"Monthly Status"),
    h("div",{},mrows),
    h("div",{cls:"spacer"})
  ]);
}

// 芒聰聙芒聰聙 Entry 芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙
function buildEntry() {
  var form=S.form, dcap=S.settings.dcap;
  var th=(form.q310h||0)+(form.q311h||0)+(form.q312h||0)+(form.q313h||0);
  var rem=Math.max(0,dcap-th);
  var pct=Math.min(1,th/dcap);
  var pclr=pct>1?"#ef4444":pct>.9?"#f59e0b":"#3b82f6";

  function setF(k,v) { S.form[k]=v; }
  function goDate(d) {
    var nd=shiftDate(S.eDate,d), e=S.entries[nd]||{};
    S.eDate=nd;
    S.form={q310h:e.q310h||0,q311h:e.q311h||0,q312h:e.q312h||0,q313h:e.q313h||0,other:e.other||0,third:e.third||0};
    draw();
  }

  function doSave() {
    var r=S.settings.r, f=S.form;
    var q310h=parseFloat(f.q310h)||0, q311h=parseFloat(f.q311h)||0;
    var q312h=parseFloat(f.q312h)||0, q313h=parseFloat(f.q313h)||0;
    var other=parseFloat(f.other)||0, third=parseFloat(f.third)||0;
    var upd = {
      q310h,q311h,q312h,q313h,other,third,
      q310$:calc$(q310h,r.Q310), q311$:calc$(q311h,r.Q311),
      q312$:calc$(q312h,r.Q312), q313$:calc$(q313h,r.Q313)
    };
    S.entries=Object.assign({},S.entries);
    S.entries[S.eDate]=upd;
    saveE(S.entries);
    S.form=Object.assign({},S.form,{q310h,q311h,q312h,q313h,other,third});
    showToast("Entry saved 芒聹聯");
  }

  var codeRows = CKEYS.map(function(code){
    var key=code.toLowerCase()+"h";
    var ci=CODES[code];
    var dollars=calc$(parseFloat(form[key])||0, S.settings.r[code]);
    return h("div",{cls:"code-row"},[
      h("span",{cls:"code-badge",style:{background:ci.bg,color:ci.color}},code),
      h("span",{cls:"code-label"},ci.label),
      h("span",{cls:"code-calc"},dollars>0?"$"+dollars:""),
      h("input",{cls:"h-input",type:"text",inputmode:"decimal",value:String(form[key]||""),placeholder:"0",
        oninput:function(e){ setF(key,e.target.value); },
        onblur:function(e){ setF(key,parseFloat(e.target.value)||0); draw(); }
      })
    ]);
  });

  return h("div",{cls:"screen"},[
    h("div",{cls:"date-nav"},[
      h("div",{cls:"dnav-btn",onclick:function(){goDate(-1);}},"芒聙鹿"),
      h("div",{cls:"date-display"},fmtDate(S.eDate)),
      h("div",{cls:"dnav-btn",onclick:function(){goDate(1);}},"芒聙潞")
    ]),
    h("div",{cls:"hero"},[
      h("div",{cls:"hero-lbl"},"Remaining today"),
      h("div",{cls:"hero-val"},[rem.toFixed(1),h("span",{cls:"hero-unit"},"hrs")]),
      h("div",{cls:"hero-sub"},"Used "+th.toFixed(1)+" of "+dcap+" hr daily max"),
      h("div",{cls:"pbar-wrap"},[h("div",{cls:"pbar-fill",style:{width:(pct*100)+"%",background:pclr}})])
    ]),
    th>dcap?h("div",{cls:"warn-box"},"芒職聽  Daily cap exceeded by "+(th-dcap).toFixed(1)+" hrs"):null,
    h("div",{cls:"sh"},"FHO Hours")
  ].concat(codeRows).concat([

    (function(){ var t=svgEl("text",{x:"57",y:"52","text-anchor":"middle","font-size":"17","font-weight":"800",fill:"#f0f6ff","font-family":"Helvetica Neue,Arial,sans-serif"});

    {n:"Q312 + Q313 芒聣陇 25%", v:cd.th===0?"No data":cd.q3r<=.25?"芒聹聯 "+(cd.q3r*100).toFixed(1)+"%":"芒聹聴 "+(cd.q3r*100).toFixed(1)+"%", c:cd.th===0?"na":cd.q3r<=.25?(cd.q3r>.22?"near":"ok"):"bad"},

    {n:"Any day > 14 hrs",  v:cd.th===0?"No data":cd.maxD<=S.settings.dcap?"芒聹聯 Max "+cd.maxD.toFixed(1)+" hrs":"芒聹聴 Max "+cd.maxD.toFixed(1)+" hrs", c:cd.th===0?"na":cd.maxD<=S.settings.dcap?"ok":"bad"}
  ];

  return h("div",{cls:"screen"},[
    h("div",{cls:"mnav"},[
      h("div",{cls:"mnav-btn",onclick:function(){S.compM=(mi+11)%12;draw();}},"芒聙鹿"),
      h("div",{cls:"mnav-title"},MF[mi]+" "+S.settings.year),
      h("div",{cls:"mnav-btn",onclick:function(){S.compM=(mi+1)%12;draw();}},"芒聙潞")
    ]),
    h("div",{cls:"ring-card"},[
      h("div",{cls:"ring-hd"},"Hours cap usage 芒聙聰 "+MN[mi]),
      h("div",{cls:"ring-wrap"},[
        svg,
        h("div",{cls:"ring-stats"},[
          h("div",{},[h("div",{cls:"rstat-val"},cd.th.toFixed(1)),h("div",{cls:"rstat-lbl"},"Hours logged")]),
          h("div",{},[h("div",{cls:"rstat-val"},cd.cap.toFixed(1)),h("div",{cls:"rstat-lbl"},"Monthly cap")]),
          h("div",{},[h("div",{cls:"rstat-val "+remCls},remH.toFixed(1)),h("div",{cls:"rstat-lbl"},"Remaining")])
        ])
      ])
    ]),
    h("div",{cls:"sh"},"Compliance Checks"),
    h("div",{cls:"c-card"},checks.map(function(c){ return h("div",{cls:"c-row"},[h("span",{cls:"c-name"},c.n),h("span",{cls:"c-val "+c.c},c.v)]); })),
    h("div",{cls:"sh"},"Hours by Code"),
    h("div",{cls:"c-card"},CKEYS.map(function(code){
      var kh=code.toLowerCase()+"h", k$=code.toLowerCase()+"$";
      var ci=CODES[code];
      return h("div",{cls:"c-row"},[

    ])),

function buildSettings() {
  var s=S.settings;
  function upd(k,v) { s[k]=v; saveS(s); draw(); }
  function updR(code,v) { s.r[code]=v; saveS(s); draw(); }

  function doExport() {
    var rows=[["Date","Q310h","Q310$","Q311h","Q311$","Q312h","Q312$","Q313h","Q313$","OtherOHIP$","3rdParty$","TotalHours","TotalRev"]];

    });

        h("div",{cls:"s-val"},["$",h("input",{cls:"s-input",type:"number",min:"0",step:"1",value:String(s.r[code]),style:{width:"52px"},oninput:function(e){updR(code,parseFloat(e.target.value)||0);}})," /hr"])

      h("div",{cls:"s-row"},[h("span",{cls:"s-key"},"Daily maximum"),h("div",{cls:"s-val"},[h("input",{cls:"s-input",type:"number",min:"1",max:"24",step:"0.5",value:String(s.dcap),style:{width:"52px"},oninput:function(e){upd("dcap",parseFloat(e.target.value)||14);}})," hrs"])]),
      h("div",{cls:"s-row"},[h("span",{cls:"s-key"},"Q312 + Q313 cap"),h("span",{cls:"s-val"},"25% of monthly hours")]),
      h("div",{cls:"s-row"},[h("span",{cls:"s-key"},"Q313 cap"),h("span",{cls:"s-val"},"5% of monthly hours")])

      h("div",{cls:"s-row"},[h("span",{cls:"s-key"},"Reminders enabled"),h("div",{cls:"s-val"},[h("div",{cls:"toggle"+(s.rem?" on":""),onclick:function(){upd("rem",!S.settings.rem);}})])])
    ]),

    h("button",{cls:"exp-btn",onclick:doExport},"芒聠聯  Export to CSV / Excel"),
    h("div",{style:{height:"18px",marginTop:"14px",textAlign:"center"}},[h("span",{style:{fontSize:"9px",fontWeight:"700",color:"#243044",letterSpacing:".14em",textTransform:"uppercase"}},"FHO Billing Tracker 脗路 v2.0")]),

    h("span",{},new Date().toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"})),
