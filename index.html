body{font-family:var(--sans);-webkit-tap-highlight-color:transparent;color:var(--txt)}

.cval{font-family:var(--mono);font-size:10px;font-weight:700}

.srow{display:flex;align-items:center;justify-content:space-between;padding:10px 13px;border-bottom:1px solid var(--border2)}
.srow:last-child{border-bottom:none}
.skey{font-family:var(--sans);font-size:12px;color:var(--txt2)}
.sval{font-family:var(--mono);font-size:10px;color:var(--muted);display:flex;align-items:center;gap:4px}
.sinput{background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--txt3);font-family:var(--mono);font-size:12px;text-align:right;padding:3px 7px;outline:none;width:62px}
.sinput:focus{border-color:var(--blue)}
.tog{width:36px;height:20px;background:var(--border2);border-radius:10px;position:relative;cursor:pointer;flex-shrink:0}
.tog.on{background:var(--blue)}
.tog::after{content:'';position:absolute;width:14px;height:14px;background:white;border-radius:50%;top:3px;left:3px;transition:transform .2s}
.tog.on::after{transform:translateX(16px)}
.expbtn{width:100%;background:var(--bg);border:1px dashed var(--border);border-radius:11px;color:var(--txt3);font-family:var(--mono);font-size:10px;padding:12px;cursor:pointer;text-transform:uppercase;letter-spacing:.1em;margin-top:4px}

.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(14px);background:var(--green);color:var(--txt);font-family:var(--mono);font-size:10px;padding:9px 18px;border-radius:20px;opacity:0;transition:all .25s;pointer-events:none;z-index:999;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

.hint{background:#0d2a42;border:1px solid var(--blue);border-radius:11px;padding:11px 13px;margin:0 0 10px;display:flex;align-items:flex-start;gap:9px}
.hint-txt{flex:1;font-family:var(--sans);font-size:11px;color:var(--txt3);line-height:1.5}
.hint-txt b{color:var(--txt2);display:block;margin-bottom:2px}
.hint-x{font-size:16px;color:var(--muted);cursor:pointer;padding:2px 5px;line-height:1}

  });

}

}

function draw(){
  var tab=S.tab;
  var toast=h("div",{cls:"toast"+(S.toastOn?" show":"")},S.toast);
  var sb=h("div",{cls:"sb"},[
    h("span",{},new Date().toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"})),
    h("span",{},"FHO 脗路 "+S.settings.year)
  ]);

  // Hint banner
  var hint=S.hint?h("div",{cls:"hint",style:{margin:"0 14px 10px"}},[
    h("div",{cls:"hint-txt"},[h("b",{},"Add to Home Screen"),"Use the same Full Page URL every visit to keep your data. Tap Share 芒聠聮 Add to Home Screen to install."]),
    h("span",{cls:"hint-x",onclick:function(){S.hint=false;draw();}},"芒聹聲")
  ]):null;

  // Nav
  var navKids;
  if(tab==="dashboard") navKids=[
    h("div",{},[h("div",{cls:"nav-title"},"FHO Tracker"),h("div",{cls:"nav-sub"},S.settings.year+" 脗路 Full Year")]),
    h("div",{cls:"nav-btn",onclick:function(){S.tab="settings";draw();}},"芒職聶")
  ];
  else if(tab==="entry") navKids=[h("div",{cls:"nav-title"},"Log Entry"),h("span",{style:{fontFamily:"Courier New,monospace",fontSize:"10px",color:"#4a7a9b"}},S.eDate)];
  else if(tab==="compliance") navKids=[h("div",{cls:"nav-title"},"Compliance"),h("span",{style:{fontFamily:"Courier New,monospace",fontSize:"10px",color:"#4a7a9b"}},String(S.settings.year))];
  else navKids=[h("div",{cls:"nav-title"},"Settings"),h("span",{style:{fontFamily:"Courier New,monospace",fontSize:"10px",color:"#3dba7a",cursor:"pointer"},onclick:function(){showToast("Settings saved 芒聹聯");}},"Save")];
  var nav=h("div",{cls:"nav"},navKids);

  // Screen
  var screen;
  if(tab==="dashboard") screen=buildDashboard();
  else if(tab==="entry") screen=buildEntry();
  else if(tab==="compliance") screen=buildCompliance();
  else screen=buildSettings();

  // Tabs
  var tabData=[{id:"dashboard",ic:"芒聦聜",lb:"Dashboard"},{id:"entry",ic:"芒聹聨",lb:"Log Entry"},{id:"compliance",ic:"芒聴聨",lb:"Compliance"},{id:"settings",ic:"芒職聶",lb:"Settings"}];
  var tabs=h("div",{cls:"tabs"},tabData.map(function(t){
    return h("div",{cls:"tab"+(tab===t.id?" on":""),onclick:function(){S.tab=t.id;draw();}},[
      h("div",{cls:"tab-ic"},t.ic),
      h("div",{cls:"tab-lb"},t.lb)
    ]);
  }));

  var appNode=h("div",{style:{display:"flex",flexDirection:"column",height:"100%"}},[toast,sb,hint,nav,screen,tabs]);
  var root=document.getElementById("app");
  while(root.firstChild) root.removeChild(root.firstChild);
  root.appendChild(appNode);
}
